<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약 상세</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <link rel="stylesheet" href="./css/detail.css" />
    <script type="module" src="./js/detail.js" defer></script>
  </head>
  <body>
    <div class="page-wrap">
      <div class="container py-5">
        <!-- 상단 헤더 -->
        <div class="top-header mb-4">
          <div>
            <p class="page-badge mb-2">
              <i class="fa-regular fa-calendar-days"></i>
              예약 내역
            </p>
            <h1 class="page-title mb-1">전체 상담 예약 목록</h1>
            <p class="page-desc mb-0">
              예약 내역을 확인하고, 클릭해서 수정할 수 있습니다.
            </p>
          </div>

          <a href="./calendar.html" class="btn btn-outline-primary back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            캘린더로 돌아가기
          </a>
        </div>

        <!-- 필터 카드 -->
        <div class="filter-card card border-0 shadow-sm mb-4">
          <div class="card-body">
            <div class="row g-3 align-items-center">
              <div class="col-lg-6">
                <label for="search-input" class="form-label filter-label">
                  검색
                </label>
                <div class="input-group search-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-magnifying-glass"></i>
                  </span>
                  <input
                    type="text"
                    id="search-input"
                    class="form-control"
                    placeholder="이름, 유형, 제목으로 검색"
                  />
                </div>
              </div>

              <div class="col-md-6 col-lg-3">
                <label for="sort-select" class="form-label filter-label">
                  정렬
                </label>
                <select id="sort-select" class="form-select">
                  <option value="latest">최신순</option>
                  <option value="oldest">오래된순</option>
                </select>
              </div>

              <div class="col-md-6 col-lg-3">
                <label class="form-label filter-label">전체 건수</label>
                <div class="count-box" id="summary-count">총 0건</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 예약 리스트 -->
        <section id="schedule-list" class="schedule-list"></section>
      </div>
    </div>

    <!-- 수정 모달 -->
    <div
      class="modal fade"
      id="reservationModal"
      tabindex="-1"
      aria-labelledby="reservationModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header">
            <h5 class="modal-title" id="reservationModalLabel">
              예약 정보 수정
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="닫기"
            ></button>
          </div>

          <div class="modal-body">
            <form id="reservation-form">
              <input type="hidden" id="edit-id" />

              <div class="mb-3">
                <label for="edit-title" class="form-label">제목</label>
                <input
                  type="text"
                  id="edit-title"
                  class="form-control"
                  placeholder="예: 진로 상담"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="edit-type" class="form-label">유형</label>
                <input
                  type="text"
                  id="edit-type"
                  class="form-control"
                  placeholder="예: 취업 상담"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="edit-date" class="form-label">날짜</label>
                <input
                  type="date"
                  id="edit-date"
                  class="form-control"
                  required
                />
              </div>

              <div class="mb-3">
                <label for="edit-time" class="form-label">시간</label>
                <input
                  type="text"
                  id="edit-time"
                  class="form-control"
                  placeholder="예: 09:00~10:00"
                  required
                />
              </div>

              <div class="mb-2">
                <label for="edit-name" class="form-label">이름</label>
                <input
                  type="text"
                  id="edit-name"
                  class="form-control"
                  placeholder="예: 홍길동"
                  required
                />
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">
              취소
            </button>
            <button
              type="submit"
              form="reservation-form"
              class="btn btn-primary"
            >
              저장하기
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
